[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -v
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require DB or external services)
    slow: Slow tests (backtest simulations)
    phase0: Phase 0 foundation tests
    phase1: Phase 1 data/analysis tests
log_cli = true
log_cli_level = WARNING
