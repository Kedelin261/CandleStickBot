# ─────────────────────────────────────────────────────────────────────────────
# OFFICIAL variant — tqs=0.0 (continuity with Sprints 14–16)
# This is the primary measurement config. Used in all official scorecards.
# Note: minimum_tqs=0.0 means the TQS gate accepts any bar; this matches how
#       Sprints 14–15 were run and is the continuity baseline.
# ─────────────────────────────────────────────────────────────────────────────
official:
  lookback_window: 200
  minimum_tqs: 0.0
  minimum_rr: 2.0
  slippage_pips: 1.0
  initial_balance: 10000

# ─────────────────────────────────────────────────────────────────────────────
# APPENDIX — tqs60 variant (spec-intent config)
# Identical to official except minimum_tqs=60.0, which matches the Phase 1
# spec's original intent (TQS gate engaged). This is a PRE-REGISTERED
# measurement — NOT tuning. No other parameter may differ from 'official'.
# If a scorecard on this variant is run, it must be clearly labeled APPENDIX.
# ─────────────────────────────────────────────────────────────────────────────
appendix_tqs60:
  lookback_window: 200
  minimum_tqs: 60.0
  minimum_rr: 2.0
  slippage_pips: 1.0
  initial_balance: 10000

# ─────────────────────────────────────────────────────────────────────────────
# VERDICT CRITERIA (passes_baseline)
# Encoded here for reference; authoritative implementation in:
#   src/backtesting/backtest_runner.py::BacktestResult.passes_baseline
# ─────────────────────────────────────────────────────────────────────────────
verdict_criteria:
  profit_factor_min: 1.10      # strictly greater than
  expectancy_r_min: 0.0        # strictly greater than
  max_drawdown_pct_max: 25.0   # strictly less than
  min_trades: 30               # N >= 30 required for any verdict

# ─────────────────────────────────────────────────────────────────────────────
# PROVENANCE NOTES
# ─────────────────────────────────────────────────────────────────────────────
provenance:
  frozen_sprint: "Sprint 14"
  frozen_commit: "cbb4092"
  verified_sprint: "Sprint 15"
  verified_commit: "2f4761b"
  registered_sprint: "Sprint 16"
  note: >
    lookback_window=200 was the value used in all Sprint 14 baselines.
    minimum_tqs=0.0 was discovered during Sprint 14 investigation; the TQS gate
    was inactive (not filtering) during all Sprints 14-15 official runs.
    The appendix_tqs60 variant measures the gate stack as originally intended
    and is a pre-registered measurement — any run on it must be labeled APPENDIX.
    These parameters are FROZEN. Walk-forward, Monte Carlo, optimization,
    multi-pair, H4, and live trading are out of scope until Sprint 17+.
