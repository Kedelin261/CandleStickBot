# =============================================================================
# CandleStickBot — Default Configuration
# Version: 3.1 (Phase 0 — Foundation)
# Based on: Automated Forex Trading Bot Planning Document v3.1
# =============================================================================
# IMPORTANT: Do NOT edit this file directly for environment-specific settings.
# Override values in config/local_config.yaml (gitignored) or via environment
# variables prefixed with CSBOT_
# =============================================================================

# ---------------------------------------------------------------------------
# SYSTEM SETTINGS
# ---------------------------------------------------------------------------
system:
  version: "0.1.0"
  phase: 1                    # Current development phase (1 = MVP)
  log_level: "INFO"           # DEBUG | INFO | WARN | ERROR | CRITICAL
  log_dir: "logs"
  report_dir: "reports"
  db_url: "sqlite:///data/candlestickbot.db"  # Dev: SQLite; Prod: PostgreSQL URL

# ---------------------------------------------------------------------------
# EXECUTION MODE
# M10 — Trade Execution Engine
# Modes: backtest | paper | demo | live
# Default: backtest (safest; requires explicit promotion)
# ---------------------------------------------------------------------------
execution:
  mode: "backtest"            # MUST be changed explicitly to paper/demo/live
  approval_mode: "auto"       # auto | manual (manual = human approval gate)
  slippage_pips: 1.0          # Slippage modeled in backtest fills
  signal_expiry_minutes: 30   # Pending signals expire after N minutes (manual mode)
  broker: "mt5"               # mt5 | oanda | alpaca

  # MT5 Connection (Phase 1+)
  # ⚠️  SECURITY: Do NOT commit real credentials here.
  # Override these values in a local_config.yaml that is .gitignore'd.
  # See README.md security note for credential rotation instructions.
  mt5:
    login: 0                  # PLACEHOLDER — set via local_config.yaml
    password: ""              # PLACEHOLDER — set via local_config.yaml
    server: ""                # MT5 broker server name (e.g. "ICMarkets-Demo")
    timeout: 60000            # Connection timeout in ms

# ---------------------------------------------------------------------------
# SYMBOLS AND TIMEFRAMES
# Phase 1 MVP: EURUSD D1 only
# Phase 2+: Additional pairs and H4 timeframe
# ---------------------------------------------------------------------------
symbols:
  - "EURUSD"                  # Phase 1 only
  # Phase 2+ additions (disabled):
  # - "GBPUSD"
  # - "USDJPY"
  # - "AUDUSD"

timeframes:
  primary: "D1"               # Daily — primary signal timeframe
  context: "W1"               # Weekly — trend bias only, no signals
  # Phase 2+ (disabled):
  # intraday: "H4"            # 4H — Phase 2+ intraday entries

# ---------------------------------------------------------------------------
# STRATEGY SETTINGS
# M08 — Strategy Engine / M07 — Pattern Engine
# Phase 1: Pin Bar + Engulfing Bar ONLY
# Phase 2+: Inside Bar Breakout + Inside Bar False Breakout
# ---------------------------------------------------------------------------
strategies:
  pin_bar:
    enabled: true             # Active in Phase 1
    min_tail_ratio: 2.0       # Tail must be >= 2x body size
    min_tail_pct_of_range: 0.60   # Tail >= 60% of total bar range
    max_opposite_wick_ratio: 0.50 # Opposite wick <= 50% of body
    min_body_pips: 1.0        # Body must exist (anti-doji)
    max_body_pct_of_range: 0.35   # Body <= 35% of total range
    quality_min_score: 5      # Minimum pattern quality to consider (1-10)
    buffer_pips: 5.0          # Stop loss buffer beyond tail tip

  engulfing_bar:
    enabled: true             # Active in Phase 1
    strict_mode: false        # false=body only; true=full range engulfment
    min_engulf_pct: 0.0       # 0 = any engulfment qualifies (body overlap)
    quality_min_score: 5      # Minimum pattern quality to consider (1-10)
    buffer_pips: 5.0          # Stop loss buffer

  inside_bar:
    enabled: false            # DISABLED — Phase 2+ only
    strict_containment: true  # High/low must be strictly inside (no equals)
    cancel_after_candles: 3   # Cancel stop order if no breakout after N candles
    quality_min_score: 5

  inside_bar_false_breakout:
    enabled: false            # DISABLED — Phase 2+ only
    max_candles_outside: 3    # FB must occur within N candles of inside bar
    quality_min_score: 5
    buffer_pips: 5.0

# ---------------------------------------------------------------------------
# TREND DETECTION
# M04 — Trend Detection Engine
# M03 — Market Structure Engine
# ---------------------------------------------------------------------------
trend:
  method: "swing_points_and_ma"    # swing_points | ma_only | swing_points_and_ma
  ma_period: 21                    # 21 SMA — primary dynamic level
  swing_lookback: 5                # Bars left AND right to confirm swing point
  min_swing_points: 4              # Minimum confirmed swings for trend classification
  min_trend_amplitude_pips: 100    # Minimum trend leg size to qualify
  range_tolerance_pips: 50         # Max swing divergence to classify as RANGING
  adx_filter: false                # ADX confirmation filter (optional)
  adx_period: 14
  adx_threshold: 25                # ADX >= 25 for TRENDING confirmation

# ---------------------------------------------------------------------------
# SUPPORT / RESISTANCE ENGINE
# M05 — S/R Engine
# Phase 1: Swing S/R + 21 SMA only
# Phase 2+: Supply/Demand zones + Fibonacci levels
# ---------------------------------------------------------------------------
levels:
  sr_engine:
    enabled: true
    lookback_bars: 200              # Historical bars to scan for levels
    cluster_tolerance_pips: 10.0    # Group levels within N pips
    min_strength_score: 3           # Minimum score to qualify as key level (1-10)
    max_age_bars: 300               # Levels older than this are retired
    min_touches: 1                  # Minimum reversals at level to qualify

  supply_demand_zones:
    enabled: false                  # DISABLED — Phase 2+ only
    min_body_atr_ratio: 0.70        # Origin candle body >= 70% of ATR
    max_age_bars: 300

  fibonacci:
    enabled: false                  # DISABLED — Phase 2+ only
    levels: [0.236, 0.382, 0.500, 0.618, 0.786]
    primary_levels: [0.500, 0.618]  # Only these used for trade gating
    zone_tolerance_pips: 10.0

# ---------------------------------------------------------------------------
# MARKET REGIME ENGINE
# M16 — Market Regime Engine
# ALL 5 regimes active from Phase 1 (essential for edge filtering)
# ---------------------------------------------------------------------------
regime:
  atr_period: 14
  atr_ma_period: 14
  bb_period: 20
  bb_std_dev: 2.0
  bb_width_ma_period: 20
  adx_period: 14
  choppiness_period: 14
  choppiness_threshold: 61.8       # Fibonacci-derived threshold

  # Regime thresholds (from Section M16 spec)
  trending:
    adx_min: 25
    atr_expansion_factor: 1.0      # ATR > ATR_MA * this factor
    bb_expansion_factor: 1.1       # BB_Width > BB_Width_MA * this factor

  ranging:
    adx_max: 20
    bb_contraction_factor: 0.9     # BB_Width < BB_Width_MA * this factor

  volatile:
    atr_high_factor: 1.5           # ATR > ATR_MA * 1.5 AND ADX < 25
    adx_max: 25

  quiet:
    atr_low_factor: 0.6            # ATR < ATR_MA * 0.6
    bb_quiet_factor: 0.7           # BB_Width < BB_Width_MA * 0.7

# ---------------------------------------------------------------------------
# TRADE QUALITY SCORE (TQS)
# M08 — Strategy Engine, Section 2a
# ---------------------------------------------------------------------------
tqs:
  min_score_to_trade: 60          # REJECT below this (0-59 = REJECT)
  premium_threshold: 80            # PREMIUM tier threshold (80-100)
  components:
    trend_max: 25
    level_max: 25
    pattern_max: 25
    regime_max: 25

  # Risk tier configuration
  standard_risk_pct: 1.0          # STANDARD tier (TQS 60-79)
  premium_risk_pct: 1.0           # PREMIUM tier DEFAULT = same as standard
  # To enable 1.5% for PREMIUM: set premium_risk_pct: 1.5
  # Requires ALL 4 TQS components >= 15 pts AND explicit config
  premium_min_component_score: 15 # All 4 components must score >= this for 1.5%

# ---------------------------------------------------------------------------
# RISK ENGINE
# M09 — Risk Engine
# Section 7 — Risk Management Rules
# ---------------------------------------------------------------------------
risk:
  # Position sizing
  risk_per_trade_pct: 1.0         # Default 1% risk per trade
  max_risk_per_trade_pct: 2.0     # HARD CAP — cannot be exceeded by any means
  min_rr_ratio: 2.0               # Minimum reward:risk ratio (cannot set below 2.0)
  preferred_rr_ratio: 3.0         # Preferred R:R (boosts signal quality score)

  # Lot constraints
  min_lot: 0.01                   # Micro lot
  lot_step: 0.01                  # Round down to nearest 0.01

  # Portfolio limits
  max_open_trades: 3              # Global maximum simultaneous open trades
  max_trades_per_currency: 2      # Max trades referencing same base currency

  # Loss limits
  daily_loss_limit_pct: 3.0       # Block entries if daily loss >= 3%
  weekly_loss_limit_pct: 6.0      # Block entries if weekly loss >= 6%

  # Kill switch
  kill_switch_drawdown_pct: 10.0  # Halt all trading if drawdown from peak >= 10%
  kill_switch_consecutive_losses: 7  # Halt after N consecutive losses

  # Stop loss buffering
  buffer_pips_default: 5.0        # Default stop buffer beyond pattern extreme
  buffer_pips_scale_by_atr: false # If true, scale buffer by ATR

# ---------------------------------------------------------------------------
# TRADE FILTERS
# M09 — Risk Engine (filter section)
# ---------------------------------------------------------------------------
filters:
  # Spread filter
  max_spread_pips: 5.0            # Reject trade if spread > this
  min_spread_pips: 0.1            # Sanity check lower bound

  # Session filter (London + New York — default)
  session_filter_enabled: true
  sessions:
    london:
      start_utc: "08:00"
      end_utc: "17:00"
    new_york:
      start_utc: "13:00"
      end_utc: "22:00"
  # Trade only during configured sessions (union of all enabled sessions)

  # News blackout filter
  news_filter_enabled: false      # DISABLED in Phase 1 (no API configured)
  news_blackout_minutes: 30       # Block entries N min before/after major events
  high_impact_events:             # Events that trigger blackout
    - "NFP"
    - "CPI"
    - "FOMC"
    - "ECB_RATE"
    - "BOE_RATE"
    - "FED_RATE"

  # Correlation filter (single-pair Phase 1 = no effect)
  correlation_filter_enabled: false  # Enabled when multi-pair active (Phase 2+)
  correlation_block_threshold: 0.70  # Block same-direction if correlation >= this
  correlation_warn_threshold: 0.40   # Warn (reduce size 50%) if >= this
  correlation_period_days: 60        # Rolling correlation window

# ---------------------------------------------------------------------------
# PORTFOLIO EXPOSURE ENGINE
# M17 — Designed for Phase 1, ACTIVATED in Phase 2+
# ---------------------------------------------------------------------------
portfolio:
  enabled: false                  # DISABLED in Phase 1 (single pair)
  max_portfolio_heat_pct: 6.0     # Max combined risk across all open trades
  max_currency_exposure_pct: 3.0  # Max net exposure per single currency
  max_directional_exposure_pct: 4.0  # Max net long/short any currency

# ---------------------------------------------------------------------------
# BACKTESTING ENGINE
# M11 — Backtesting Engine
# ---------------------------------------------------------------------------
backtest:
  # Data range
  in_sample_start: "2014-01-01"
  in_sample_end: "2021-12-31"
  out_of_sample_start: "2022-01-01"
  out_of_sample_end: "2024-12-31"

  # Spread assumptions (conservative — see Section 10)
  spread_pips:
    EURUSD: 1.5
    GBPUSD: 2.0
    USDJPY: 1.5
    default: 2.0

  # Slippage model
  entry_slippage_pips: 1.0
  exit_slippage_pips: 0.5

  # Commission (ECN model)
  commission_per_lot: 7.0         # $7 round-turn per full lot

  # Walk-forward settings
  walk_forward:
    in_sample_months: 24          # In-sample window size
    out_of_sample_months: 6       # OOS window size
    min_folds: 3                  # Minimum number of folds
    preferred_folds: 5

  # Monte Carlo
  monte_carlo:
    n_simulations: 1000
    random_seed: 42               # Reproducibility

  # Backtest pass criteria (Section 10)
  pass_criteria:
    min_profit_factor: 1.3
    min_win_rate: 0.35
    min_expectancy_r: 0.3
    max_drawdown_pct: 20.0
    min_sharpe_ratio: 0.5
    min_trade_count: 200          # Statistical significance floor

# ---------------------------------------------------------------------------
# OPTIMIZATION ENGINE
# M12 — DESIGNED, DISABLED in Phase 1
# Activated ONLY after baseline backtest passes (Optimization Governance Policy)
# ---------------------------------------------------------------------------
optimization:
  enabled: false                  # DISABLED — Phase 2+ only
  max_params: 5                   # Max parameters to optimize simultaneously
  fitness_function: "pf_over_dd"  # profit_factor / max_drawdown (composite)
  # Prohibited: optimizing on P&L directly

# ---------------------------------------------------------------------------
# STRATEGY ANALYTICS ENGINE
# M18 — Active from Phase 1
# ---------------------------------------------------------------------------
analytics:
  enabled: true
  degradation_alert_threshold: 0.80   # Alert if recent 30d PF < 80% of all-time PF
  degradation_lookback_days: 30
  min_trades_for_scorecard: 10        # Minimum trades before generating scorecard

# ---------------------------------------------------------------------------
# TRADE REVIEW ENGINE
# M19 — Active from Phase 1
# ---------------------------------------------------------------------------
trade_review:
  enabled: true
  systematic_error_threshold: 0.30   # Alert if any non-statistical loss category > 30%
  promotion_block_bad_regime_pct: 0.15  # Block promotion if BAD_REGIME > 15%
  promotion_block_bad_signal_pct: 0.20  # Block if BAD_SIGNAL > 20%

  # Loss classification thresholds
  bad_signal_quality_threshold: 5     # Pattern quality_score < 5 = BAD_SIGNAL
  bad_level_strength_threshold: 3     # level_strength_score < 3 = BAD_LEVEL
  bad_execution_slippage_pips: 3.0    # Fill deviation > 3 pips = BAD_EXECUTION
  bad_execution_tight_stop_atr: 1.0   # Stop < 1x ATR = BAD_EXECUTION

# ---------------------------------------------------------------------------
# PAPER TRADING PROMOTION CRITERIA
# Section 8 / Section 15
# ---------------------------------------------------------------------------
promotion:
  paper_to_demo:
    min_completed_trades: 50        # Statistical floor
    min_calendar_months: 3          # Market regime coverage floor
    min_profit_factor: 1.3
    max_drawdown_pct: 20.0
    require_positive_expectancy: true
    bad_regime_plus_bad_signal_max_pct: 0.20

  demo_to_live:
    min_completed_trades: 50
    min_calendar_months: 3
    min_profit_factor: 1.3
    max_drawdown_pct: 10.0
    max_backtest_degradation_pct: 0.30  # Demo PF must be >= 70% of backtest PF
    bad_regime_plus_bad_signal_max_pct: 0.15
